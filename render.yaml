services:
  - type: web
    name: marathon-tracker
    runtime: go
    plan: free
    region: singapore
    buildCommand: go mod download && go build -tags netgo -ldflags '-s -w' -o app ./cmd/marathon
    startCommand: ./app
    healthCheckPath: /api/state
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: arog_auth
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
