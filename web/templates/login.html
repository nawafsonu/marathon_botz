<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Marathon Tracker</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="login-shell">
    <section class="panel login-panel">
      <div class="brand-mark">MT</div>
      <div class="section-heading">
        <div>
          <h1>Login</h1>
          <p>Admin and volunteer race operations</p>
        </div>
      </div>
      <form method="post" action="/login" class="stacked-form">
        <label>
          Username
          <input name="username" autocomplete="username" required autofocus>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Sign in</button>
        {{if .Error}}<p class="form-status error" role="alert">{{.Error}}</p>{{end}}
      </form>
      <div class="guest-divider">
        <span>or</span>
      </div>
      <div class="guest-certificate-box">
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
          <span class="guest-entry-icon">🏅</span>
          <strong>Download My Certificate</strong>
        </div>
        <form method="post" action="/guest-login" class="stacked-form" id="guest-credential-form" novalidate>
          <label for="bib-input">
            Bib Number
            <input
              type="text"
              id="bib-input"
              name="bib"
              value="{{.Bib}}"
              placeholder="e.g. 042"
              autocomplete="off"
              autocapitalize="characters"
              maxlength="20"
              required
            >
          </label>
          <label for="name-input">
            Registered Full Name
            <input
              type="text"
              id="name-input"
              name="name"
              value="{{.Name}}"
              placeholder="e.g. John Doe"
              autocomplete="name"
              required
            >
          </label>
          <button type="submit" style="background: var(--orange); color: #ffffff; font-weight: 900; min-height: 3rem; margin-top: 0.5rem;">Get My Certificate →</button>
          {{if .GuestError}}<p class="form-status error" role="alert" style="margin-top: 0.5rem;">{{.GuestError}}</p>{{end}}
        </form>
      </div>
      <a href="/leaderboard" class="guest-entry-link" id="leaderboard-entry-link" style="margin-top: 0.75rem;">
        <span class="guest-entry-icon">🏆</span>
        <span class="guest-entry-text">
          <strong>View Live Leaderboard</strong>
          <small>Check live standings and results · no login required</small>
        </span>
        <span class="guest-entry-arrow">→</span>
      </a>
    </section>
  </main>
  <style>
    .guest-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
    }
    .guest-divider::before,
    .guest-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .guest-entry-link {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      background: #f8fafc;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }
    .guest-entry-link:hover {
      background: #fde8eb;
      border-color: rgba(200, 16, 46, 0.25);
    }
    .guest-entry-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .guest-entry-text {
      flex: 1;
      display: grid;
      gap: 0.1rem;
    }
    .guest-entry-text strong {
      font-size: 0.95rem;
      font-weight: 800;
    }
    .guest-entry-text small {
      color: var(--muted);
      font-size: 0.78rem;
    }
    .guest-entry-arrow {
      color: var(--muted);
      font-size: 1.1rem;
    }
    .guest-certificate-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1.25rem;
      background: #f8fafc;
      margin-bottom: 0.75rem;
      text-align: left;
    }
  </style>
  <script>
    var bibInput = document.getElementById('bib-input');
    if (bibInput) {
      bibInput.addEventListener('blur', function () {
        this.value = this.value.trim().toUpperCase();
      });
    }
  </script>
</body>
</html>
