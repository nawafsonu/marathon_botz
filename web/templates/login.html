<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Marathon Tracker</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="login-shell">
    <section class="panel login-panel">
      <div class="brand-mark">MT</div>
      <div class="section-heading">
        <div>
          <h1>Login</h1>
          <p>Admin and volunteer race operations</p>
        </div>
      </div>
      <form method="post" action="/login" class="stacked-form">
        <label>
          Username
          <input name="username" autocomplete="username" required autofocus>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Sign in</button>
        {{if .Error}}<p class="form-status error" role="alert">{{.Error}}</p>{{end}}
      </form>
    </section>
  </main>
</body>
</html>
